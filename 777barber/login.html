<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>777 Barber | Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">777</span>
        <span>777 Barber</span>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">&#9776;</button>
      <nav class="nav-links" id="navLinks">
        <a class="active" href="login.html">Login</a>
        <a href="index.html">Início</a>
        <a href="agendamento.html">Agendamento</a>
        <a href="produtos.html">Cosméticos</a>
        <a href="profissional.html">Profissional</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container grid-2">
      <section>
        <span class="badge">Acesso ao sistema</span>
        <p></p>
        <h1>Login</h1>
        <p>Área reservada para entrada de clientes.</p>
        <p class="muted" style="font-size:0.9rem; margin-top: 32px;">
          É proprietário? <a href="login-admin.html" style="color: var(--gold);">Acesse o painel administrativo →</a>
        </p>
      </section>

      <section class="form-wrap">
        <div id="loginAlert" class="alert" style="display:none;"></div>
        <form id="loginForm" novalidate>
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" type="email" placeholder="seuemail@exemplo.com" autocomplete="email">
            <span class="field-error" id="emailError"></span>
          </div>
          <div class="field" style="margin-top: 14px;">
            <label for="senha">Senha</label>
            <div class="input-wrap">
              <input id="senha" type="password" placeholder="Digite sua senha" autocomplete="current-password">
              <button type="button" class="toggle-pw" id="toggleSenha" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error" id="senhaError"></span>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="btnEntrar">Entrar</button>
            <a class="btn btn-secondary" href="cadastro.html">Cadastrar</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Área de login</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
