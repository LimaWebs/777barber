<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>777 Barber | Acesso Administrativo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container navbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">777</span>
        <span>777 Barber</span>
      </a>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">&#9776;</button>
      <nav class="nav-links" id="navLinks">
        <a href="login.html">Login</a>
        <a href="index.html">Início</a>
        <a href="agendamento.html">Agendamento</a>
        <a href="produtos.html">Cosméticos</a>
        <a class="active" href="profissional.html">Profissional</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container grid-2">
      <section>
        <span class="badge" style="border-color: rgba(214,178,94,0.5); background: rgba(214,178,94,0.15);">Área restrita</span>
        <p></p>
        <h1>Painel Administrativo</h1>
        <p>Acesso exclusivo para o proprietário da barbearia.</p>
        <p class="muted" style="font-size:0.9rem; margin-top: 32px;">
          É cliente? <a href="login.html" style="color: var(--gold);">Acesse o login de clientes →</a>
        </p>
      </section>

      <section class="form-wrap" style="border-color: rgba(214,178,94,0.2);">
        <div id="adminAlert" class="alert" style="display:none;"></div>
        <form id="adminLoginForm" novalidate>
          <div class="field">
            <label for="adminEmail">E-mail do proprietário</label>
            <input id="adminEmail" type="email" placeholder="proprietario@777barber.com" autocomplete="email">
            <span class="field-error" id="adminEmailError"></span>
          </div>
          <div class="field" style="margin-top: 14px;">
            <label for="adminSenha">Senha</label>
            <div class="input-wrap">
              <input id="adminSenha" type="password" placeholder="Senha administrativa" autocomplete="current-password">
              <button type="button" class="toggle-pw" id="toggleAdminSenha" aria-label="Mostrar senha">👁</button>
            </div>
            <span class="field-error" id="adminSenhaError"></span>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="btnAdminEntrar">Acessar painel</button>
            <a class="btn btn-secondary" href="index.html">Voltar</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer>
    <div class="container">
      <p>Área administrativa restrita</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
  <script src="js/login-admin.js"></script>
</body>
</html>
